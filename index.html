<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sah-Khush - Profile Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e8dfd7;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    .card {
      width: 380px;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
      text-align: center;
      padding: 44px 32px 32px;
      position: relative;
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #faf8f6, #fff);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      box-shadow: 0 8px 30px rgba(76, 18, 17, 0.18);
      padding: 18px;
      position: relative;
    }

    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid rgba(76, 18, 17, 0.1);
    }

    .logo-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #3a0d0c;
      letter-spacing: 0.5px;
    }

    .name span {
      color: #6b1a18;
    }

    .title {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 6px;
      font-weight: 500;
    }

    .divider {
      width: 44px;
      height: 3px;
      background: linear-gradient(90deg, #4c1211, #7a1d1b);
      border-radius: 3px;
      margin: 16px auto 16px;
    }

    .bio {
      font-size: 14px;
      color: #777;
      line-height: 1.7;
      margin-bottom: 22px;
      font-weight: 400;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-align: left;
      background: #f5f2ef;
      border-radius: 16px;
      padding: 4px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      color: #444;
      padding: 10px 16px;
      border-radius: 12px;
      background: #fff;
    }

    .contact-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 22px;
    }

    .social-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #4c1211;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 14px rgba(76, 18, 17, 0.2);
    }

    .social-btn svg {
      width: 22px;
      height: 22px;
    }

    .social-btn:hover {
      transform: scale(1.12) translateY(-2px);
      box-shadow: 0 8px 24px rgba(76, 18, 17, 0.3);
    }

    .social-btn:active {
      transform: scale(0.95);
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 7px 22px;
      border-radius: 50px;
      background: linear-gradient(135deg, #4c1211 0%, #6b1a18 100%);
      color: #f5e6d3;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      box-shadow: 0 4px 16px rgba(76, 18, 17, 0.2);
    }

    @media print {
      body { background: #fff; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }

    }

    @media (max-width: 420px) {
      .card { width: 100%; padding: 36px 20px 24px; }
      .name { font-size: 24px; }
      .social-btn { width: 44px; height: 44px; }
      .social-btn svg { width: 20px; height: 20px; }
    }
  </style>
</head>
